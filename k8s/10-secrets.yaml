# ─────────────────────────────────────────────────────────────────────────────
# Secrets
#
# DO NOT COMMIT REAL CREDENTIALS. The values below are PLACEHOLDERS.
# Replace this manifest (or override it) with a real Secret before deploying.
#
# Recommended: create the secret imperatively instead of applying this file, e.g.
#
#   kubectl -n scraper create secret generic scraper-secrets \
#     --from-literal=ANTHROPIC_API_KEY='sk-ant-YOUR_KEY_HERE' \
#     --from-literal=POSTGRES_USER='scraper' \
#     --from-literal=POSTGRES_PASSWORD='scraper' \
#     --from-literal=POSTGRES_DB='scraper' \
#     --from-literal=DEDUP_POSTGRES_DSN='postgresql://scraper:scraper@postgres:5432/scraper'
#
# If you do apply this file, edit the stringData values first.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: scraper-secrets
  namespace: scraper
  labels:
    app.kubernetes.io/part-of: scraper-system
type: Opaque
stringData:
  # REQUIRED — used by Module 2's LLM extractor fallback. Replace before deploy.
  ANTHROPIC_API_KEY: "sk-ant-REPLACE_ME"
  # PostgreSQL credentials. Keep these in sync with DEDUP_POSTGRES_DSN below.
  POSTGRES_USER: "scraper"
  POSTGRES_PASSWORD: "scraper"
  POSTGRES_DB: "scraper"
  # Connection string used by the dedup-worker (Module 4).
  DEDUP_POSTGRES_DSN: "postgresql://scraper:scraper@postgres:5432/scraper"
