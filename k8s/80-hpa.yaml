# ─────────────────────────────────────────────────────────────────────────────
# HorizontalPodAutoscalers — CPU-based, 2–6 replicas.
# Requires metrics-server to be installed in the cluster.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: scraper-worker
  namespace: scraper
  labels:
    app: scraper-worker
    app.kubernetes.io/part-of: scraper-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: scraper-worker
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: dedup-worker
  namespace: scraper
  labels:
    app: dedup-worker
    app.kubernetes.io/part-of: scraper-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dedup-worker
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
